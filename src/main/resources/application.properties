spring.application.name=lms
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root@123}

# Database Connection Pool — Tuned for Azure MySQL
# minimumIdle: keep 3 warm connections ready at all times (prevents cold-start spikes)
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10
# initialization-fail-timeout=-1: don't fail on startup if DB is cold (Azure free tier wakes up)
spring.datasource.hikari.initialization-fail-timeout=-1
# connection-timeout: fail fast at 10s, not 30s (better UX than hanging)
spring.datasource.hikari.connection-timeout=10000
# keepalive-time: ping idle connections every 60s to keep them alive
spring.datasource.hikari.keepalive-time=60000
# idle-timeout: 4 min (Azure MySQL kills idle connections at ~5 min, so close before that)
spring.datasource.hikari.idle-timeout=240000
# max-lifetime: recycle connections every 10 min to prevent stale connections
spring.datasource.hikari.max-lifetime=600000
# connection-test-query: lightweight ping used to validate connections from pool
spring.datasource.hikari.connection-test-query=SELECT 1

# CORS Allowed Origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://lms.sanatanrana.me}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# open-in-view=false: don't hold DB connection open for the full HTTP request lifecycle
# (default is true — wastes connection pool slots on every API call)
spring.jpa.open-in-view=false
# Batch lazy-loads into groups of 20 instead of firing 1 query per entity
spring.jpa.properties.hibernate.default_batch_fetch_size=20
# Enable JDBC batch inserts/updates (reduces round-trips for bulk writes)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=8080

# Azure Blob Storage Configuration
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:ranadjcontainer}

# Multipart File Upload Limits (Allows up to 500MB for video lessons)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# JWT Authentication Secret Key (Production key must be at least 256 bits/32 characters)
jwt.secret=${JWT_SECRET:temporary_development_secret_key_at_least_32_characters_long_for_security}
# JWT expiry in milliseconds (default: 24 hours = 86400000)
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─────────────────────────────────────────────────
# PAYMENT GATEWAY: Razorpay (India)
# Set these in your environment variables or here for production.
# ─────────────────────────────────────────────────
# razorpay.key.id=rzp_live_XXXXXXXXXXXXXX
# razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
# Set to 'razorpay' to use Razorpay, 'mock' for testing
payment.gateway=${PAYMENT_GATEWAY:mock}

# ─────────────────────────────────────────────────
# AI PROVIDER: Google Gemini
# Get your key at: https://aistudio.google.com/app/apikey
# ─────────────────────────────────────────────────
# gemini.api.key=AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
# Set to 'gemini' to use Gemini AI, 'mock' for testing
ai.provider=${AI_PROVIDER:gemini}

# ─────────────────────────────────────────────────
# OTP & NOTIFICATION: Email SMTP (Gmail example)
# ─────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# App name used in email sender
app.mail.from=${MAIL_FROM:noreply@learngen.app}
app.name=${APP_NAME:LearnGen}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ─────────────────────────────────────────────────
# OTP: SMS via Twilio (optional — set these to enable SMS OTP)
# ─────────────────────────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# ─────────────────────────────────────────────────
# ACTUATOR (Health / Metrics — restrict in production)
# ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ─────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────
logging.level.com.lms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
